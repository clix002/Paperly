query GetCommentsByDocument($documentId: ID!, $options: OptionsInput) {
  getCommentsByDocument(documentId: $documentId, options: $options) {
    docs {
      id
      content
      documentId
      authorId
      isAi
      createdAt
      author {
        id
        name
        email
        role
        image
      }
    }
    info {
      totalDocs
      totalPages
      page
      limit
      hasNextPage
      hasPrevPage
    }
  }
}

query GetDocumentsWithComments {
  getDocumentsWithComments {
    id
    title
    status
    requiresSignature
    createdAt
    updatedAt
    receiver {
      id
      name
      email
    }
  }
}

subscription OnCommentAdded($documentId: ID!) {
  commentAdded(documentId: $documentId) {
    id
    content
    documentId
    authorId
    isAi
    createdAt
    author {
      id
      name
      email
      role
      image
    }
  }
}

mutation CreateComment($documentId: ID!, $content: String!) {
  createComment(documentId: $documentId, content: $content) {
    id
    content
    documentId
    authorId
    isAi
    createdAt
    author {
      id
      name
      email
      role
      image
    }
  }
}
