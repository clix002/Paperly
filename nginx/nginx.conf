events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
  }

  upstream web {
    server web:3001;
  }

  # API — api.TU_DOMINIO o IP/api
  server {
    listen 80;
    server_name api.*;

    location / {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Web — dominio principal o IP
  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
